<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hello World Party</title>
<style>
body{
  margin:0;
  overflow:hidden;
  height:100vh;
  font-family:Arial,sans-serif;
  animation:bg 10s linear infinite;
}
@keyframes bg{
  0%{background:hsl(0,80%,92%)}
  25%{background:hsl(90,80%,92%)}
  50%{background:hsl(180,80%,92%)}
  75%{background:hsl(270,80%,92%)}
  100%{background:hsl(360,80%,92%)}
}
#hello{
  position:absolute;
  font-size:48px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet);
  -webkit-background-clip:text;
  color:transparent;
}
button{
  position:fixed;
  top:20px;
  left:20px;
  padding:10px 16px;
  z-index:1000;
}
.trail,.spark{
  position:absolute;
  pointer-events:none;
  border-radius:50%;
}
.trail{
  width:10px;height:10px;
  background:rgba(0,0,0,.15);
  animation:fade .8s forwards;
}
.spark{
  width:8px;height:8px;
  background:gold;
  animation:pop 1s forwards;
}
@keyframes fade{to{opacity:0;transform:scale(2)}}
@keyframes pop{to{opacity:0;transform:translateY(-50px) scale(0)}}
</style>
</head>
<body>

<button onclick="party()">🎉 Party Mode</button>
<div id="hello">Hello, World!</div>

<script>
const h=document.getElementById("hello");
let x=100,y=100,dx=3,dy=2,speed=1;

function loop(){
  x+=dx*speed; y+=dy*speed;
  if(x<0||x+h.offsetWidth>innerWidth) dx*=-1;
  if(y<0||y+h.offsetHeight>innerHeight) dy*=-1;

  h.style.left=x+"px";
  h.style.top=y+"px";

  const t=document.createElement("div");
  t.className="trail";
  t.style.left=(x+20)+"px";
  t.style.top=(y+20)+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),800);

  requestAnimationFrame(loop);
}

function party(){
  speed = speed===1 ? 3 : 1;
}

document.addEventListener("click",e=>{
  for(let i=0;i<12;i++){
    const s=document.createElement("div");
    s.className="spark";
    s.style.left=(e.clientX+(Math.random()-0.5)*60)+"px";
    s.style.top=(e.clientY+(Math.random()-0.5)*60)+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
});

loop();
</script>
</body>
</html>
